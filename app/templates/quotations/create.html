{% extends "layouts/base.html" %}

{% block title %}Create Quotation | Freight CRM{% endblock %}

{% block content %}
<div class="quotation-create-page">
    <div class="create-header">
        <h1>Create Quotation - {{ enquiry.enquiry_reference }}</h1>
    </div>

    <form method="POST" action="{{ url_for('quotations.create_quotation', enquiry_id=enquiry.id) }}" class="quotation-form-card">
        
        <!-- SECTION 1: Shipment Details -->
        <div class="form-section">
            <h3>Shipment Details</h3>
            <div class="quotation-form-grid">
                <div class="form-field">
                    <label>Shipping Line / Airline</label>
                    <input type="text" name="shipping_line_airline" placeholder="e.g. Maersk/Emirates">
                </div>
                <div class="form-field">
                    <label>No. of Containers</label>
                    <input type="number" name="no_of_containers" placeholder="0">
                </div>
                <div class="form-field">
                    <label>Container Type</label>
                    <input type="text" name="container_type_quota" placeholder="e.g. 40HC">
                </div>
                <div class="form-field">
                    <label>ETD</label>
                    <input type="datetime-local" name="etd">
                </div>
                <div class="form-field">
                    <label>Cut-off Date (Doc)</label>
                    <input type="datetime-local" name="cutoff_date_documentation">
                </div>
                <div class="form-field">
                    <label>Cut-off Date (Cargo)</label>
                    <input type="datetime-local" name="cutoff_date_cargo">
                </div>
                <div class="form-field">
                    <label>Free Time (Days)</label>
                    <input type="number" name="free_time_days">
                </div>
                <div class="form-field">
                    <label>Transit Time (Days)</label>
                    <input type="number" name="transit_time_days">
                </div>
                <div class="form-field">
                    <label>Incoterms</label>
                    <input type="text" name="incoterms" value="{{ enquiry.incoterms or '' }}">
                </div>
                <div class="form-field">
                    <label>HS Code</label>
                    <input type="text" name="hs_code">
                </div>
            </div>
        </div>

        <!-- SECTION 2: Cost Breakdown -->
        <div class="form-section">
            <h3>Cost Breakdown</h3>
            <div class="quotation-form-grid">
                <div class="form-field">
                    <label>Ocean / Air Freight</label>
                    <input type="number" name="ocean_air_freight" step="0.01" value="0.00">
                </div>
                <div class="form-field">
                    <label>Origin Charges</label>
                    <input type="number" name="origin_charges" step="0.01" value="0.00">
                </div>
                <div class="form-field">
                    <label>Destination Charges</label>
                    <input type="number" name="destination_charges" step="0.01" value="0.00">
                </div>
                <div class="form-field">
                    <label>Insurance Charges</label>
                    <input type="number" name="insurance_charges" step="0.01" value="0.00">
                </div>
                <div class="form-field">
                    <label>Other Surcharges</label>
                    <input type="number" name="other_surcharges" step="0.01" value="0.00">
                </div>
            </div>
        </div>

        <!-- SECTION 3: Quotation Details -->
        <div class="form-section">
            <h3>Quotation Details</h3>
            <div class="quotation-form-grid">
                <div class="form-field">
                    <label>Quotation Amount <span>*</span> <small style="color: #6b7280; font-weight: normal;">(Auto-calculated)</small></label>
                    <input type="number" name="quotation_amount" step="0.01" value="0.00" readonly required style="background-color: #f3f4f6; cursor: not-allowed;">
                </div>
                <div class="form-field">
                    <label>Currency <span>*</span></label>
                    <select name="currency" required>
                        <option value="USD">USD</option>
                        <option value="AED">AED</option>
                        <option value="KWD">KWD</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Validity Date <span>*</span></label>
                    <input type="date" name="validity_date" required>
                </div>
                <div class="form-field form-field-full">
                    <label>Payment Terms</label>
                    <input type="text" name="payment_terms" placeholder="e.g. Credit 30 days">
                </div>
                <div class="form-field form-field-full">
                    <label>Remarks / Terms & Conditions</label>
                    <textarea name="remarks_terms" rows="4" placeholder="Additional terms, notes..."></textarea>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="create-quotation-btn">Create Quotation</button>
        </div>
    </form>
</div>

<script>
    const costFields = ['ocean_air_freight', 'origin_charges', 'destination_charges', 'insurance_charges', 'other_surcharges'];
    const totalField = document.querySelector('input[name="quotation_amount"]');

    function calculateTotal() {
        let total = 0;
        costFields.forEach(field => {
            const input = document.querySelector(`input[name="${field}"]`);
            if (input) {
                total += parseFloat(input.value) || 0;
            }
        });
        totalField.value = total.toFixed(2);
    }

    costFields.forEach(field => {
        const input = document.querySelector(`input[name="${field}"]`);
        if (input) {
            input.addEventListener('input', calculateTotal);
        }
    });
</script>
{% endblock %}

{% block extra_css %}
<style>
    /* CSS Styles - నీ పాత స్టైల్స్ అలాగే ఉన్నాయి */
    .quotation-create-page { max-width: 1050px; margin: 0 auto; }
    .create-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 22px; }
    .create-header h1 { margin: 0 0 7px; color: #111827; font-size: 28px; font-weight: 800; }
    .quotation-form-card { padding: 26px; border: 1px solid #e5e7eb; border-radius: 16px; background: #ffffff; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05); }
    .form-section { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #f1f5f9; }
    .form-section h3 { margin: 0 0 18px; color: #111827; font-size: 18px; font-weight: 800; }
    .quotation-form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
    .form-field { display: flex; flex-direction: column; gap: 7px; }
    .form-field-full { grid-column: 1 / -1; }
    .form-field label { color: #374151; font-size: 13px; font-weight: 700; }
    .form-field label span { color: #b91c1c; }
    .form-field input, .form-field select, .form-field textarea { width: 100%; box-sizing: border-box; padding: 11px 12px; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; }
    .form-actions { display: flex; justify-content: flex-end; padding-top: 22px; margin-top: 22px; border-top: 1px solid #eef2f7; }
    .create-quotation-btn { padding: 12px 24px; border: 0; border-radius: 10px; background: #7f1d1d; color: #ffffff; font-weight: 800; cursor: pointer; }
    @media (max-width: 768px) { .quotation-form-grid { grid-template-columns: 1fr; } }
</style>
{% endblock %}
